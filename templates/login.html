<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f3f4f6;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<form class="box" method="POST">
    <h2 style="text-align:center;">Login</h2>

    <input name="lietotajvards" placeholder="Lietotājvārds" required>
    <input name="parole" type="password" placeholder="Parole" required>

    <button type="submit">Ienākt</button>
</form>

</body>
</html>
