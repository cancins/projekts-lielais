<!DOCTYPE html>
<html>
<head>
    <title>Calendar</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f3f4f6;
            margin: 0;
        }

        .topbar {
            background: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .nba-bar {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px;
            background: #eee;
        }

        .card {
            min-width: 220px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #calendar {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div>👋 Sveiks, {{ username }}</div>
    <a href="/logout">Logout</a>
</div>

<div class="nba-bar">
    {% for e in events %}
    <div class="card">
        <b>{{ e.team1 }} vs {{ e.team2 }}</b><br>
        {{ e.score }}<br>
        <small>{{ e.status }}</small>
    </div>
    {% endfor %}
</div>

<div id="calendar"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',

        events: '/events',

        dateClick: function(info) {
            let time = prompt("Ievadi laiku:");

            if (time) {
                fetch("/add_event", {
                    method: "POST",
                    headers: {"Content-Type": "application/x-www-form-urlencoded"},
                    body: "date=" + info.dateStr + "&time=" + time
                }).then(() => {
                    calendar.refetchEvents();
                });
            }
        }
    });

    calendar.render();
});
</script>

</body>
</html>
